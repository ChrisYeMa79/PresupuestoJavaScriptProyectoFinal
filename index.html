<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Presupuesto</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script src="js/Dato.js"></script>
    <script src="js/Ingreso.js"></script>
    <script src="js/Egreso.js"></script>
    <script src="js/app.js"></script>

    
</head>
<body onload="cargarApp()">


    <!-- CABECERO -->
    <div class="cabecero">
        <div class="presupuesto">

            <div class="presupuesto_titulo">
                Presupuesto Disponible
            </div>

            <div class="presupuesto_valor" id="presupuesto">
                +2,000.00
            </div>

            <!-- INGRESOS -->
            <div class="presupuesto_ingreso limpiarEstilos">
                <div class="presupuesto_ingreso--texto">
                    Ingresos
                </div>
                <div class="derecha">
                    <div class="presupuesto_ingreso--valor" id="ingresos">
                        +4,000.00
                    </div>
                    <div class="presupuesto_ingreso--porcentaje">
                        &nbsp;
                    </div>
                </div>
            </div>

            <!-- EGRESOS -->
            <div class="presupuesto_egreso limpiarEstilos">
                <div class="presupuesto_egreso--texto">
                    Egresos
                </div>
                <div class="derecha limpiarEstilos">
                    <div class="presupuesto_egreso--valor" id="egresos">
                        -1,900.00
                    </div>
                    <div class="presupuesto_egreso--porcentaje" id="porcentaje">
                        45%
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- FORMULARIO -->
    <form id="forma" onsubmit="return false">
        <div class="agregar">
            <div class="agregar_contenedor">

                <select class="agregar_tipo" id="tipo" name="tipo">
                    <option value="ingreso" selected>+</option>
                    <option value="egreso">-</option>
                </select>

                <input type="text" class="agregar_descripcion" id="descripcion" name="descripcion" placeholder="Agregar Descripción">

                <input type="number" class="agregar_valor" name="valor" step="any" placeholder="Valor">

                <button class="agregar_btn" onclick="agregarDato()">
                    <ion-icon name="checkmark-circle-outline"></ion-icon>
                </button>

            </div>
        </div>
    </form>

    <!-- CONTENEDOR -->
    <div class="contenedor limpiarEstilos">

        <!-- INGRESOS -->
        <div class="ingreso">
            <h2 class="ingreso_titulo">Ingresos</h2>

            <div id="lista-ingresos">

                <div class="elemento limpiarEstilos">
                    <div class="elemento_descripcion">Salario</div>
                    <div class="derecha limpiarEstilos">
                        <div class="elemento_valor">+20,000.00</div>
                        <div class="elemento_eliminar">
                            <button class="elemento_eliminar--btn">
                                <ion-icon name="close-circle-outline"></ion-icon>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="elemento limpiarEstilos">
                    <div class="elemento_descripcion">Venta de Auto</div>
                    <div class="derecha limpiarEstilos">
                        <div class="elemento_valor">+50,000.00</div>
                        <div class="elemento_eliminar">
                            <button class="elemento_eliminar--btn">
                                <ion-icon name="close-circle-outline"></ion-icon>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- EGRESOS -->
        <div class="egreso">
            <h2 class="egreso_titulo">Egresos</h2>

            <div id="lista-egresos">

                <div class="elemento limpiarEstilos">
                    <div class="elemento_descripcion">Renta</div>
                    <div class="derecha limpiarEstilos">
                        <div class="elemento_valor">-9000.00</div>
                        <div class="elemento_porcentaje">12.86%</div>
                        <div class="elemento_eliminar">
                            <button class="elemento_eliminar--btn">
                                <ion-icon name="close-circle-outline"></ion-icon>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="elemento limpiarEstilos">
                    <div class="elemento_descripcion">Comida</div>
                    <div class="derecha limpiarEstilos">
                        <div class="elemento_valor">-3000.00</div>
                        <div class="elemento_porcentaje">4.29%</div>
                        <div class="elemento_eliminar">
                            <button class="elemento_eliminar--btn">
                                <ion-icon name="close-circle-outline"></ion-icon>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- ICONOS -->
    <script type="module" src="https://unpkg.com/ionicons@5.4.0/dist/ionicons/ionicons.esm.js"></script>
    

</body>
</html>
